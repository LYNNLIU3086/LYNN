<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassini · Temporal Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e8dcc4;
            overflow: hidden;
            font-weight: 300;
        }
        
        #main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            padding: 25px 40px;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e8dcc4 0%, #d4a574 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #header .meta {
            font-size: 0.75rem;
            color: #8b7963;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        #view-area {
            flex: 1;
            display: flex;
            position: relative;
        }
        
        #ring-3d {
            width: 58%;
            position: relative;
        }
        
        #right-panel {
            width: 42%;
            background: linear-gradient(90deg, rgba(10,10,15,0.8) 0%, rgba(10,10,15,0.95) 100%);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(232, 220, 196, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        #temporal-slices {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        #temporal-slices::-webkit-scrollbar {
            width: 4px;
        }
        
        #temporal-slices::-webkit-scrollbar-track {
            background: rgba(232, 220, 196, 0.05);
        }
        
        #temporal-slices::-webkit-scrollbar-thumb {
            background: rgba(232, 220, 196, 0.2);
            border-radius: 2px;
        }
        
        .section-header {
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(232, 220, 196, 0.1);
        }
        
        .section-header h2 {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 3px;
            color: #e8dcc4;
            text-transform: uppercase;
        }
        
        .section-header p {
            font-size: 0.7rem;
            color: #8b7963;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        
        .ring-slice {
            margin-bottom: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .ring-slice::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                rgba(232, 220, 196, 0) 0%, 
                rgba(232, 220, 196, 0.03) 50%, 
                rgba(232, 220, 196, 0) 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .ring-slice:hover::before {
            opacity: 1;
        }
        
        .ring-slice:hover {
            transform: translateX(5px);
        }
        
        .ring-slice.active {
            background: rgba(232, 220, 196, 0.05);
            border-left: 2px solid #d4a574;
        }
        
        .ring-slice canvas {
            width: 100%;
            height: 90px;
            display: block;
        }
        
        .slice-label {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 0.75rem;
            color: #d4a574;
            letter-spacing: 2px;
            font-weight: 300;
            padding: 4px 12px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 2px;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }
        
        .slice-count {
            position: absolute;
            left: 15px;
            bottom: 10px;
            font-size: 0.65rem;
            color: #8b7963;
            letter-spacing: 1px;
        }
        
        #timeline-container {
            padding: 25px 40px 30px;
            background: linear-gradient(0deg, rgba(10,10,15,0.98) 0%, rgba(10,10,15,0.9) 100%);
            border-top: 1px solid rgba(232, 220, 196, 0.08);
        }
        
        #current-date-display {
            font-size: 1.1rem;
            color: #d4a574;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-weight: 300;
            text-align: center;
        }
        
        #timeline {
            width: 100%;
            height: 50px;
            position: relative;
        }
        
        #timeline-track {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, 
                rgba(232, 220, 196, 0.1) 0%, 
                rgba(232, 220, 196, 0.3) 50%, 
                rgba(232, 220, 196, 0.1) 100%);
            position: relative;
            margin-top: 25px;
        }
        
        .timeline-marker {
            position: absolute;
            width: 1px;
            height: 16px;
            background: rgba(232, 220, 196, 0.3);
            top: -8px;
        }
        
        .timeline-label {
            position: absolute;
            font-size: 0.7rem;
            color: #8b7963;
            top: 10px;
            transform: translateX(-50%);
            letter-spacing: 1px;
            font-weight: 300;
        }
        
        #playhead {
            position: absolute;
            width: 2px;
            height: 40px;
            background: linear-gradient(180deg, #d4a574 0%, rgba(212, 165, 116, 0) 100%);
            top: -20px;
            cursor: grab;
            transition: box-shadow 0.3s;
        }
        
        #playhead:hover {
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }
        
        #playhead:active {
            cursor: grabbing;
        }
        
        #playhead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #d4a574;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.6);
        }
        
        #controls {
            position: absolute;
            top: 100px;
            right: calc(42% + 30px);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        button {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(232, 220, 196, 0.15);
            color: #e8dcc4;
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 300;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }
        
        button:hover {
            background: rgba(232, 220, 196, 0.1);
            border-color: rgba(232, 220, 196, 0.3);
            transform: translateX(-3px);
        }
        
        button.active {
            background: rgba(212, 165, 116, 0.15);
            border-color: #d4a574;
            color: #d4a574;
        }
        
        .ring-label {
            position: absolute;
            font-size: 0.7rem;
            color: rgba(232, 220, 196, 0.4);
            letter-spacing: 2px;
            font-weight: 300;
            padding: 4px 10px;
            background: rgba(10, 10, 15, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 2px;
            border: 1px solid rgba(232, 220, 196, 0.1);
            pointer-events: none;
        }
        
        #stats {
            position: absolute;
            bottom: 140px;
            right: calc(42% + 30px);
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border: 1px solid rgba(232, 220, 196, 0.1);
            border-radius: 2px;
        }
        
        .stat-item {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        .stat-label {
            color: #8b7963;
            font-weight: 300;
        }
        
        .stat-value {
            color: #d4a574;
            font-weight: 400;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 29%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .loading-text {
            font-size: 0.8rem;
            color: #8b7963;
            letter-spacing: 3px;
            margin-top: 15px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(232, 220, 196, 0.1);
            border-top-color: #d4a574;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="header">
            <h1>SATURN</h1>
            <div class="meta">Cassini CDA · Radial Temporal Analysis · 2005—2017</div>
        </div>
        
        <div id="view-area">
            <div id="ring-3d">
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">INITIALIZING</div>
                </div>
                <canvas id="ring-canvas"></canvas>
                
                <div class="ring-label" style="left: 12%; top: 25%;">Enceladus</div>
                <div class="ring-label" style="left: 18%; top: 55%;">Tethys</div>
                <div class="ring-label" style="left: 22%; top: 38%;">Dione</div>
            </div>
            
            <div id="right-panel">
                <div id="temporal-slices">
                    <div class="section-header">
                        <h2>Temporal Slices</h2>
                        <p>Real radial density distribution from Cassini CDA data</p>
                    </div>
                    <div id="slices-container"></div>
                </div>
                
                <div id="timeline-container">
                    <div id="current-date-display">2005 / 01 / 16</div>
                    <div id="timeline">
                        <div id="timeline-track">
                            <div id="playhead"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="controls">
                <button id="btn-play">Play</button>
                <button onclick="viewTop()">Top View</button>
                <button onclick="viewSide()">Side View</button>
                <button onclick="viewAngled()">Angled</button>
            </div>
            
            <div id="stats">
                <div class="stat-item">
                    <span class="stat-label">Particles</span>
                    <span class="stat-value" id="particle-count">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Categories</span>
                    <span class="stat-value" id="category-count">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Time Progress</span>
                    <span class="stat-value" id="time-progress">0%</span>
                </div>
            </div>
        </div>
    </div>

        function loadRingData() {
            const categories = Object.keys(TIME_DATA.categories);
            let totalParticles = 0;
            
            categories.forEach((cat, idx) => {
                const catData = TIME_DATA.categories[cat];
                const points = catData.points;
                
                const positions = [];
                const colors = [];
                const sizes = [];
                
                points.forEach(point => {
                    const r = point.r * 2;
                    const theta = point.theta;
                    
                    const x = r * Math.cos(theta);
                    const z = r * Math.sin(theta);
                    const y = (Math.random() - 0.5) * 0.15;
                    
                    positions.push(x, y, z);
                    
                    const baseColor = new THREE.Color(elegantColors.accent);
                    const timeInfluence = point.time;
                    const brightness = 0.5 + timeInfluence * 0.5;
                    
                    colors.push(
                        baseColor.r * brightness,
                        baseColor.g * brightness,
                        baseColor.b * brightness
                    );
                    
                    sizes.push(0.3 + Math.random() * 0.2);
                });
                
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
                
                const material = new THREE.PointsMaterial({
                    size: 0.7,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.75,
                    sizeAttenuation: true,
                    blending: THREE.AdditiveBlending
                });
                
                const particles = new THREE.Points(geometry, material);
                ringParticles.push(particles);
                scene.add(particles);
                
                totalParticles += points.length;
            });
            
            document.getElementById('particle-count').textContent = totalParticles.toLocaleString();
            document.getElementById('category-count').textContent = categories.length;
        }

            const container = document.getElementById('slices-container');

                const profile = RADIAL_PROFILES[year];

                slice.id = 'slice-' + idx;
                
                const canvas = document.createElement('canvas');
                canvas.width = 500;

                slice.appendChild(canvas);
                slice.appendChild(label);
                slice.appendChild(count);
                container.appendChild(slice);
                
                // 使用真实数据绘制
                drawRealProfile(canvas, profile);
                
                slice.addEventListener('click', () => {
                    document.querySelectorAll('.ring-slice').forEach(s => s.classList.remove('active'));
                    slice.classList.add('active');
                    jumpToYear(year);
                });
            });
        }
        
        function drawRealProfile(canvas, profile) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, w, h);
            
            const radii = profile.radii;
            const density = profile.density;
            const maxR = Math.max(...radii);
            
            // 渐变填充
            const gradient = ctx.createLinearGradient(0, h, 0, 0);
            gradient.addColorStop(0, 'rgba(212, 165, 116, 0)');
            gradient.addColorStop(0.4, 'rgba(212, 165, 116, 0.25)');
            gradient.addColorStop(1, 'rgba(212, 165, 116, 0.55)');
            
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            for (let i = 0; i < radii.length; i++) {
                const x = (radii[i] / maxR) * w;
                const y = h - (density[i] * h * 0.85);
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 描边
            ctx.beginPath();
            for (let i = 0; i < radii.length; i++) {
                const x = (radii[i] / maxR) * w;
                const y = h - (density[i] * h * 0.85);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(212, 165, 116, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        function createTimeline() {
            const track = document.getElementById('timeline-track');
            const playhead = document.getElementById('playhead');
            
            const years = [2005, 2007, 2009, 2011, 2013, 2015, 2017];
            years.forEach(year => {
                const pos = ((year - 2005) / 12) * 100;
                
                const marker = document.createElement('div');
                marker.className = 'timeline-marker';
                marker.style.left = pos + '%';
                track.appendChild(marker);
                
                const label = document.createElement('div');
                label.className = 'timeline-label';
                label.style.left = pos + '%';
                label.textContent = year;
                track.appendChild(label);
            });
            
            let isDragging = false;
            
            playhead.addEventListener('mousedown', () => isDragging = true);
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const rect = track.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                currentTime = x / rect.width;
                updateTimeline();
            });
            
            document.addEventListener('mouseup', () => isDragging = false);
            
            document.getElementById('btn-play').addEventListener('click', togglePlay);

                clearInterval(playInterval);

            const endDate = new Date(TIME_DATA.time_range.end);
            const totalMs = endDate - startDate;
            const currentDate = new Date(startDate.getTime() + totalMs * currentTime);
            
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            
            document.getElementById('current-date-display').textContent = `${y} / ${m} / ${d}`;
            document.getElementById('time-progress').textContent = (currentTime * 100).toFixed(1) + '%';
        }
        
        function jumpToYear(year) {
            currentTime = (year - 2005) / 12;
            updateTimeline();
        }
        
        function viewTop() {
            camera.position.set(0, 70, 0);
            camera.lookAt(0, 0, 0);
        }
        
        function viewSide() {
            camera.position.set(70, 3, 0);
            camera.lookAt(0, 0, 0);
        }
        
        function viewAngled() {
            camera.position.set(45, 35, 45);
            camera.lookAt(0, 0, 0);
        }
        
        function setupControls() {
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            
            renderer.domElement.addEventListener('mousedown', () => isDragging = true);
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const delta = { x: e.offsetX - prevMouse.x, y: e.offsetY - prevMouse.y };
                    const rotSpeed = 0.004;
                    const rotQuat = new THREE.Quaternion().setFromEuler(
                        new THREE.Euler(delta.y * rotSpeed, delta.x * rotSpeed, 0)
                    );
                    camera.position.applyQuaternion(rotQuat);
                    camera.lookAt(0, 0, 0);
                }
                prevMouse = { x: e.offsetX, y: e.offsetY };
            });
            renderer.domElement.addEventListener('mouseup', () => isDragging = false);
            
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoom = 1 + e.deltaY * 0.001;
                camera.position.multiplyScalar(Math.min(Math.max(zoom, 0.95), 1.05));
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            ringParticles.forEach(rp => {
                rp.rotation.y += 0.0001;
            });
            
            const pulse = Math.sin(Date.now() * 0.0005) * 0.02 + 1;
            saturnWireframe.scale.set(pulse, pulse, pulse);
            
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }
        
        window.addEventListener('load', init);
        window.addEventListener('resize', () => {
            const container = document.getElementById('ring-3d');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
